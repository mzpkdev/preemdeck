<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 190" width="840" height="190">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#888" stroke-width="0.3" opacity="0.12"/>
    </pattern>
    <clipPath id="glitch1">
      <rect x="0" y="108" width="840" height="5"/>
    </clipPath>
    <clipPath id="glitch2">
      <rect x="0" y="126" width="840" height="3"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

