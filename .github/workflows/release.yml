name: Release (promote to stable)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to cut, e.g. v0.1.0"
        required: true
        type: string
      ref:
        description: "Commit or branch to promote"
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: release-stable
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bunx biome check

      - name: Guard — tag unused + fast-forward-safe
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::tag ${{ inputs.version }} already exists"; exit 1
          fi
          if git ls-remote --exit-code --heads origin stable >/dev/null 2>&1; then
            git fetch --no-tags --depth 2147483647 origin stable
            git merge-base --is-ancestor FETCH_HEAD HEAD \
              || { echo "::error::ref is not ahead of stable (would be non-ff; back-port the hotfix to main first)"; exit 1; }
          fi

      - name: Tag + promote stable
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ inputs.version }}" HEAD
          git push origin "refs/tags/${{ inputs.version }}"
          git push origin "HEAD:refs/heads/stable"
