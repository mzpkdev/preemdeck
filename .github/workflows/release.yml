name: Release (promote to stable)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to cut, e.g. v0.1.0"
        required: true
        type: string
      ref:
        description: "Commit or branch to promote"
        required: false
        default: main
        type: string

permissions:
  contents: write
  checks: read

concurrency:
  group: release-stable
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Guard — the commit being promoted passed all its checks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          echo "Promoting $sha — verifying its recorded check runs are all green."
          # Every check run for the commit EXCEPT this Release job's own in-flight run.
          checks="$(gh api "repos/${{ github.repository }}/commits/$sha/check-runs" \
            --paginate --jq '.check_runs[] | select(.name | test("promote|Release") | not)
              | {name, status, conclusion}')"
          if [ -z "$checks" ]; then
            echo "::error::no check runs found for $sha — refusing to promote an unverified commit (has CI run on it?)"
            exit 1
          fi
          printf '%s\n' "$checks" | jq -r '"  \(.status)/\(.conclusion // "pending")  \(.name)"'
          # A check blocks promotion unless it completed with success/skipped/neutral.
          bad="$(printf '%s\n' "$checks" | jq -s '[.[] | . as $x
            | select($x.status != "completed" or ((["success","skipped","neutral"] | index($x.conclusion)) | not))]')"
          if [ "$(printf '%s' "$bad" | jq 'length')" -ne 0 ]; then
            echo "::error::commit $sha has checks that did not pass — not promoting to stable:"
            printf '%s' "$bad" | jq -r '.[] | "::error::  \(.name): \(.status)/\(.conclusion // "pending")"'
            exit 1
          fi
          echo "All checks green for $sha — clear to promote."

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bunx biome check

      - name: Guard — tag unused + fast-forward-safe
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::tag ${{ inputs.version }} already exists"; exit 1
          fi
          if git ls-remote --exit-code --heads origin stable >/dev/null 2>&1; then
            git fetch --no-tags --depth 2147483647 origin stable
            git merge-base --is-ancestor FETCH_HEAD HEAD \
              || { echo "::error::ref is not ahead of stable (would be non-ff; back-port the hotfix to main first)"; exit 1; }
          fi

      - name: Tag + promote stable
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ inputs.version }}" HEAD
          git push origin "refs/tags/${{ inputs.version }}"
          git push origin "HEAD:refs/heads/stable"
