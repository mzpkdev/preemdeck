name: Publish dist-edge

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: dist-edge # serialize publishes so commits stay linear (ff-safe for consumers)
  cancel-in-progress: false

jobs:
  edge:
    name: Prune + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Assemble pruned tree (allowlist)
        run: |
          set -euo pipefail
          rm -rf /tmp/stage && mkdir -p /tmp/stage
          # Only runtime paths ship. A new dead-weight file at root is excluded by
          # default; a missing runtime essential fails loudly below (allowlist, not denylist).
          for path in ripperdoc lib scripts root \
                      install.ts update.ts uninstall.ts \
                      package.json bun.lock boot.sh tsconfig.json; do
            [ -e "$path" ] && cp -R "$path" "/tmp/stage/$path"
          done
          find /tmp/stage -name '*.test.ts' -delete   # drop colocated tests
          for must in ripperdoc lib install.ts package.json bun.lock; do
            [ -e "/tmp/stage/$must" ] || { echo "::error::pruned tree missing $must"; exit 1; }
          done

      - name: Install Bun (pinned runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Bundle plugin entries self-contained (inline lib/ + npm deps)
        run: sh scripts/bundle-dist.sh /tmp/stage

      - name: Publish to dist-edge (orphan, linear, no force)
        run: |
          set -euo pipefail
          git config user.name  "preemdeck-ci"
          git config user.email "ci@preemdeck"
          if git ls-remote --exit-code --heads origin dist-edge >/dev/null 2>&1; then
            git fetch --depth 1 origin dist-edge:dist-edge
            git checkout dist-edge
          else
            git checkout --orphan dist-edge
          fi
          git rm -rqf . >/dev/null 2>&1 || true
          cp -R /tmp/stage/. .
          git add -A
          if git diff --cached --quiet; then
            echo "dist-edge already current — nothing to publish"
            exit 0
          fi
          git commit -m "edge: ${GITHUB_SHA::7}"
          git push origin dist-edge   # plain push, never --force → consumers fast-forward
