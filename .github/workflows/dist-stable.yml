name: Publish dist-stable

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit, branch, or tag to promote to stable"
        required: false
        default: main

permissions:
  contents: write

concurrency:
  group: dist-stable # serialize publishes so commits stay linear (ff-safe for consumers)
  cancel-in-progress: false

jobs:
  stable:
    name: Prune + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (ref to promote)
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0 # full history so the patch can be derived from the commit count

      - name: Assemble pruned tree (allowlist)
        run: |
          set -euo pipefail
          echo "PROMOTED_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          rm -rf /tmp/stage && mkdir -p /tmp/stage
          # Only runtime paths ship. A new dead-weight file at root is excluded by
          # default; a missing runtime essential fails loudly below (allowlist, not denylist).
          for path in ripperdoc lib scripts root \
                      install.ts update.ts uninstall.ts \
                      package.json bun.lock boot.sh tsconfig.json; do
            [ -e "$path" ] && cp -R "$path" "/tmp/stage/$path"
          done
          find /tmp/stage -name '*.test.ts' -delete   # drop colocated tests
          for must in ripperdoc lib install.ts package.json bun.lock; do
            [ -e "/tmp/stage/$must" ] || { echo "::error::pruned tree missing $must"; exit 1; }
          done

      - name: Stamp deploy version (0.0.<commit-count>)
        run: |
          set -euo pipefail
          # Source manifests are pinned at 0.0.0; stamp the patch here so every deploy
          # advances the version string the host caches key on (static = silent no-op).
          # Commit count → same commit yields the same version on edge and stable.
          sh scripts/stamp-version.sh /tmp/stage "0.0.$(git rev-list --count HEAD)"

      - name: Install Bun (pinned runtime)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Bundle plugin entries self-contained (inline lib/ + npm deps)
        run: sh scripts/bundle-dist.sh /tmp/stage

      - name: Publish to dist-stable (fresh orphan, force-push — no history accretion)
        run: |
          set -euo pipefail
          git config user.name  "preemdeck-ci"
          git config user.email "ci@preemdeck"
          # Each publish is a single-commit orphan force-pushed over dist-stable, so the branch
          # never accumulates the ~2MB/commit bundle churn. Consumers adopt it by reset
          # (boot.sh and update.ts both fetch + hard-reset), so the non-ff push is intentional.
          git checkout --orphan dist-stable-pub
          git rm -rqf . >/dev/null 2>&1 || true
          cp -R /tmp/stage/. .
          git add -A
          git commit -q -m "stable: promote ${PROMOTED_SHA}"
          # No-op guard: skip when the tree matches the current tip, so consumers aren't made
          # to re-pull identical bytes just because the SHA churned.
          git fetch --depth 1 origin dist-stable >/dev/null 2>&1 || true
          if git rev-parse -q --verify FETCH_HEAD >/dev/null 2>&1 && git diff --quiet FETCH_HEAD HEAD; then
            echo "dist-stable content unchanged — skipping publish"
            exit 0
          fi
          git push --force origin HEAD:dist-stable
