name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun:
    name: Bun (TS source)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx biome check

  wire-python:
    name: Python (wire server)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ripperdoc/wetware/wire/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        continue-on-error: true # pre-existing wire debt (53 issues); non-blocking until a dedicated cleanup
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Typecheck
        continue-on-error: true # pre-existing wire debt (31 issues); non-blocking until a dedicated cleanup
        run: uv run mypy src tests

      - name: Test
        run: uv run pytest

  docs:
    name: Markdown format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Format check (Markdown)
        run: find . -type f -name '*.md' -not -path './.venv/*' -not -path './.git/*' -not -path './node_modules/*' -not -path './experiments/*' -print0 | xargs -0 uv run mdformat --check
