name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint
        run: uv run ruff check .

      - name: Format check (Python)
        run: uv run ruff format --check .

      - name: Format check (Markdown)
        run: find . -type f -name '*.md' -not -path './.venv/*' -not -path './.git/*' -print0 | xargs -0 uv run mdformat --check

      - name: Typecheck
        run: uv run mypy

      - name: Test
        run: uv run pytest
