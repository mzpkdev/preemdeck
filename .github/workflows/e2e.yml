name: E2E (install one-liner)

# Runs the REAL public install one-liner (curl … boot.sh | bash) end-to-end against
# a throwaway $HOME, exercising all three hosts. install.ts detects a host by its
# config dir and then shells out to that host's CLI (claude/codex/gemini) to register
# marketplaces + plugins, so the CLIs must be on PATH — hence the install step below.
# The one-liner's channel follows the triggering branch: a push to main tests edge
# (clones main, so the run validates the just-pushed install.ts), while a stable
# push, PR, manual dispatch, or nightly tests the DEPLOYED stable release. boot.sh
# clones the channel's branch, so this exercises a real deployed install, not a PR's
# checked-out code.

on:
  push:
    branches: [main, stable]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # nightly, 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Real install one-liner (claude · codex · gemini)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node (host CLIs are npm packages; claude-code needs Node 22+)
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install harness CLIs
        # Local marketplace/extension registration needs no auth for claude & gemini.
        # codex MAY gate on auth (openai/codex#20621); this run is the empirical check.
        run: npm install -g @anthropic-ai/claude-code @openai/codex @google/gemini-cli

      - name: Harness CLIs on PATH (diagnostic)
        run: |
          claude --version || true
          codex --version || true
          gemini --version || true

      - name: E2E — README one-liner (channel by branch), all three hosts
        env:
          # Read by the e2e to seed ~/.claude, ~/.codex, ~/.gemini so install.ts
          # detects and targets each. install.ts aborts nonzero if a detected host's
          # CLI is missing, so this asserts all three CLIs installed + registered clean.
          PREEMDECK_E2E_HOSTS: claude,codex,gemini
          DISABLE_AUTOUPDATER: "1"
          # Channel by triggering branch: a push to main -> edge (clones main, so the
          # E2E validates the just-pushed install.ts); every other trigger (stable
          # push, PR, dispatch, nightly) -> stable, testing the deployed release.
          PREEMDECK_E2E_CHANNEL: ${{ github.event_name == 'push' && github.ref_name == 'main' && 'edge' || 'stable' }}
        run: bun run test:e2e
