description = "Set a directive — writes the given value (ask|swarm|auto) into its derived slot in preemdeck.json."
prompt = """
The user supplies a value (ask|swarm|auto) as the argument: {{args}}. Run the bundled writer with that value — `"$HOME/.preemdeck/preemdeck-runtime" "$HOME/.preemdeck/src/ripperdoc/wetware/directive/scripts/set-mode.ts" <value>`. The script self-locates preemdeck.json, derives the slot from the value, and is the only thing that should touch the file. Relay its output verbatim; on a non-zero exit, pass through the valid values it prints — don't retry with a guess. The directive takes effect on the next prompt, when the inject hook reads it.
"""
